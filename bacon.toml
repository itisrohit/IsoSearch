# bacon.toml

default_job = "check"

[jobs.check]
command = ["cargo", "check", "--color", "always"]
need_stdout = false

[jobs.clippy]
command = [
    "cargo", "clippy",
    "--all-targets",
    "--all-features",
    "--",
    "-D", "warnings"
]
need_stdout = true

[jobs.test]
command = ["cargo", "test", "--color", "always"]
need_stdout = true

[jobs.doc-open]
command = ["cargo", "doc", "--no-deps", "--open"]
need_stdout = false
