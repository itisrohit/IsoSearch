# cargo-deny configuration
# See: https://embarkstudios.github.io/cargo-deny/

[advisories]
unmaintained = "all"
yanked = "deny"
ignore = [
    "RUSTSEC-2025-0141", # Bincode unmaintained - acknowledged for initial setup
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "MPL-2.0",
    "Zlib",
    "Unlicense",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "OpenSSL", # Required by aws-lc-sys (TLS implementation)
]

[bans]
multiple-versions = "warn"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
