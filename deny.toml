# cargo-deny configuration

[advisories]
version = 2
vulnerability = "deny"
unmaintained = "warn"
yanked = "deny"
notice = "warn"

[licenses]
version = 2
trust-nodes-from-index = true
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "ISC",
]

[bans]
version = 2
deny = []
skip = []
skip-tree = []

[sources]
version = 2
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
